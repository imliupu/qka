site_name: QKA - QMT 文档
site_description: QMT 实盘交易客户端/服务端文档
site_author: QKA Team
site_url: https://zsrl.github.io/qka

repo_name: zsrl/qka
repo_url: https://github.com/zsrl/qka
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024 QKA Team

theme:
  name: material
  language: zh

plugins:
  - search:
      lang: zh

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite

nav:
  - 首页: index.md
  - 用户指南:
    - 实盘交易: user-guide/trading.md
  - API参考:
    - 交易模块: api/brokers.md
    - 工具模块: api/utils.md
